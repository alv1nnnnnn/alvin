<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Budget Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --surface-alt: #f0eeeb;
    --border: #dddbd6;
    --text: #1a1917;
    --text-muted: #7a7872;
    --accent: #2a6fdb;
    --accent-bg: #edf3fd;
    --danger: #c0392b;
    --danger-bg: #fdf0ee;
    --success: #1a7a4a;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 8px rgba(0,0,0,.04);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
    gap: 6px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--text);
  }

  #clock {
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    box-shadow: var(--shadow);
  }

  .card-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .card-value.positive { color: var(--success); }
  .card-value.negative { color: var(--danger); }

  /* Add row */
  .add-section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }

  .add-section label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 10px;
  }

  .add-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .add-row input {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface-alt);
    color: var(--text);
    padding: 0 10px;
    height: 36px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }

  .add-row input:focus {
    border-color: var(--accent);
    background: var(--surface);
  }

  .inp-name { flex: 2; min-width: 120px; }
  .inp-num  { flex: 1; min-width: 80px; }

  .btn-add {
    height: 36px;
    padding: 0 16px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s, transform .1s;
  }

  .btn-add:hover { opacity: .9; }
  .btn-add:active { transform: scale(.97); }

  /* Item list */
  .list-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .list-header {
    display: grid;
    grid-template-columns: 1fr 80px 90px 80px 100px;
    gap: 8px;
    padding: 10px 1.25rem;
    background: var(--surface-alt);
    border-bottom: 0.5px solid var(--border);
  }

  .list-header span {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .list-header span:not(:first-child) { text-align: right; }
  .list-header span:last-child { text-align: center; }

  .item-row {
    display: grid;
    grid-template-columns: 1fr 80px 90px 80px 100px;
    gap: 8px;
    align-items: center;
    padding: 10px 1.25rem;
    border-bottom: 0.5px solid var(--border);
    transition: background .12s;
  }

  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface-alt); }

  .item-name {
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item-cell {
    font-size: 14px;
    color: var(--text-muted);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .item-cell.qty {
    font-weight: 500;
    color: var(--text);
  }

  .item-total {
    font-size: 14px;
    font-weight: 500;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .item-actions {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .btn-sm {
    height: 28px;
    padding: 0 9px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background .12s, color .12s, transform .1s;
  }

  .btn-sm:hover { background: var(--surface-alt); color: var(--text); }
  .btn-sm:active { transform: scale(.96); }

  .btn-use {
    border-color: #b0c8f7;
    color: var(--accent);
    background: var(--accent-bg);
  }

  .btn-use:hover { background: #dbe8fc; }

  .btn-use:disabled {
    opacity: .35;
    cursor: not-allowed;
    transform: none;
  }

  .btn-del:hover { background: var(--danger-bg); color: var(--danger); border-color: #f0b8b2; }

  .empty {
    padding: 2.5rem 1.25rem;
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
  }

  @media (max-width: 520px) {
    .list-header,
    .item-row {
      grid-template-columns: 1fr 70px 70px 70px 90px;
      padding: 9px .75rem;
      gap: 6px;
    }
    .summary { grid-template-columns: 1fr 1fr; }
    .card-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Budget Tracker</h1>
    <span id="clock"></span>
  </header>

  <div class="summary">
    <div class="card">
      <div class="card-label">Total leftover items</div>
      <div class="card-value" id="total-qty">0</div>
    </div>
    <div class="card">
      <div class="card-label">Leftover value</div>
      <div class="card-value" id="total-val">$0.00</div>
    </div>
  </div>

  <div class="add-section">
    <label for="inp-name">Add an item</label>
    <div class="add-row">
      <input class="inp-name" id="inp-name" type="text" placeholder="Item name" />
      <input class="inp-num" id="inp-qty" type="number" placeholder="Qty" min="1" />
      <input class="inp-num" id="inp-price" type="number" placeholder="Price" min="0" step="0.01" />
      <button class="btn-add" id="btn-add">+ Add</button>
    </div>
  </div>

  <div class="list-wrap">
    <div class="list-header">
      <span>Item</span>
      <span>Price</span>
      <span>Remaining</span>
      <span>Value</span>
      <span>Actions</span>
    </div>
    <div id="list"></div>
  </div>

</div>

<script>
  var items = [];
  var nextId = 1;

  function ptClock() {
    var now = new Date();
    document.getElementById('clock').textContent = now.toLocaleString('en-US', {
      timeZone: 'America/Los_Angeles',
      weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      timeZoneName: 'short'
    });
  }
  ptClock();
  setInterval(ptClock, 1000);

  function recalc() {
    var qty = 0, val = 0;
    for (var i = 0; i < items.length; i++) {
      qty += items[i].qty;
      val += items[i].qty * items[i].price;
    }
    document.getElementById('total-qty').textContent = qty;
    var vEl = document.getElementById('total-val');
    vEl.textContent = '$' + val.toFixed(2);
    vEl.className = 'card-value' + (val > 0 ? ' positive' : val < 0 ? ' negative' : '');
  }

  function render() {
    var list = document.getElementById('list');
    if (!items.length) {
      list.innerHTML = '<div class="empty">No items yet — add one above.</div>';
      recalc();
      return;
    }
    list.innerHTML = '';
    for (var i = 0; i < items.length; i++) {
      (function(item) {
        var row = document.createElement('div');
        row.className = 'item-row';

        var nameEl = document.createElement('span');
        nameEl.className = 'item-name';
        nameEl.title = item.name;
        nameEl.textContent = item.name;

        var priceEl = document.createElement('span');
        priceEl.className = 'item-cell';
        priceEl.textContent = '$' + item.price.toFixed(2);

        var qtyEl = document.createElement('span');
        qtyEl.className = 'item-cell qty';
        qtyEl.textContent = item.qty;

        var totalEl = document.createElement('span');
        totalEl.className = 'item-total';
        totalEl.textContent = '$' + (item.qty * item.price).toFixed(2);

        var actions = document.createElement('span');
        actions.className = 'item-actions';

        var btnUse = document.createElement('button');
        btnUse.className = 'btn-sm btn-use';
        btnUse.textContent = '− Use';
        btnUse.disabled = item.qty === 0;
        btnUse.addEventListener('click', function() {
          if (item.qty > 0) { item.qty--; render(); recalc(); }
        });

        var btnDel = document.createElement('button');
        btnDel.className = 'btn-sm btn-del';
        btnDel.textContent = 'Delete';
        btnDel.addEventListener('click', function() {
          items = items.filter(function(x) { return x.id !== item.id; });
          render(); recalc();
        });

        actions.appendChild(btnUse);
        actions.appendChild(btnDel);

        row.appendChild(nameEl);
        row.appendChild(priceEl);
        row.appendChild(qtyEl);
        row.appendChild(totalEl);
        row.appendChild(actions);
        list.appendChild(row);
      })(items[i]);
    }
    recalc();
  }

  document.getElementById('btn-add').addEventListener('click', function() {
    var name = document.getElementById('inp-name').value.trim();
    var qty = parseInt(document.getElementById('inp-qty').value, 10);
    var price = parseFloat(document.getElementById('inp-price').value);
    if (!name || isNaN(qty) || qty < 1 || isNaN(price) || price < 0) return;
    items.push({ id: nextId++, name: name, qty: qty, price: price });
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-qty').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-name').focus();
    render();
  });

  ['inp-name', 'inp-qty', 'inp-price'].forEach(function(id) {
    document.getElementById(id).addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });
  });

  render();
</script>
</body>
</html>
